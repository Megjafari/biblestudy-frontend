<h1>Log in</h1>

<input [value]="username()" (input)="username.set($any($event.target).value)" placeholder="Username" />
<input type="password" [value]="password()" (input)="password.set($any($event.target).value)" placeholder="Password" />

<button (click)="submit()">Log in</button>

@if (error()) {
  <p>{{ error() }}</p>
}

<p>No account? <a routerLink="/register">Register</a></p>
