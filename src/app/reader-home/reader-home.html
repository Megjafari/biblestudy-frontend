<h1>Read the Bible</h1>

@if (lastRead(); as last) {
  <button (click)="continueReading()">Continue: {{ last.book }} {{ last.chapter }}</button>
}

<h2>Old Testament</h2>
@for (book of oldTestament(); track book.id) {
  <button (click)="selectBook(book)">{{ book.name }}</button>
}

<h2>New Testament</h2>
@for (book of newTestament(); track book.id) {
  <button (click)="selectBook(book)">{{ book.name }}</button>
}
